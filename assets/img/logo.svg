<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Outer circle with gradient -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a6b3c"/>
      <stop offset="100%" style="stop-color:#0d4a28"/>
    </linearGradient>
    <linearGradient id="cross" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#e8f8f0"/>
    </linearGradient>
  </defs>
  <circle cx="100" cy="100" r="96" fill="url(#bg)"/>
  <circle cx="100" cy="100" r="96" fill="none" stroke="#2ecc71" stroke-width="3" opacity="0.4"/>
  <!-- Medical cross -->
  <rect x="78" y="38" width="44" height="124" rx="10" fill="url(#cross)"/>
  <rect x="38" y="78" width="124" height="44" rx="10" fill="url(#cross)"/>
  <!-- Pill in center -->
  <rect x="76" y="76" width="48" height="48" rx="8" fill="url(#bg)"/>
  <rect x="82" y="88" width="36" height="12" rx="6" fill="white" opacity="0.9"/>
  <rect x="82" y="100" width="36" height="12" rx="6" fill="#2ecc71" opacity="0.9"/>
  <!-- Shine -->
  <ellipse cx="72" cy="60" rx="18" ry="10" fill="white" opacity="0.12" transform="rotate(-30 72 60)"/>
</svg>